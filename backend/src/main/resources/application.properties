server.port=${SERVER_PORT:8080}
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/acessolivre}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

jwt.public.key=${JWT_PUBLIC_KEY:classpath:app.pub}
jwt.private.key=${JWT_PRIVATE_KEY:}
jwt.token.expiration.default=${JWT_TOKEN_EXPIRATION_DEFAULT:3600}
jwt.token.expiration.remember-me=${JWT_TOKEN_EXPIRATION_REMEMBER_ME:2592000}

admin.bootstrap.secret=${ADMIN_BOOTSTRAP_SECRET:}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:*}

spring.thymeleaf.cache=false

spring.devtools.restart.enabled=${SPRING_DEVTOOLS_ENABLED:true}
spring.devtools.livereload.enabled=${SPRING_LIVERELOAD_ENABLED:true}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework=${LOG_LEVEL_SPRING:INFO}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:WARN}
logging.level.com.acessolivre=${LOG_LEVEL_APP:INFO}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

