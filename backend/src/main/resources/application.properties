# Banco PostgreSQL local
spring.datasource.url=jdbc:postgresql://localhost:5432/acessolivre
spring.datasource.username=postgres
spring.datasource.password=sua_senha_aqui
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Porta do servidor
server.port=8080

# Log
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Thymeleaf (se quiser testar telas depois)
spring.thymeleaf.cache=false

# Configurações de email (placeholder)
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=example@example.com
spring.mail.password=senha
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Segredo para bootstrap inicial do usuário ADMIN (somente primeira criação)
admin.bootstrap.secret=${ADMIN_BOOTSTRAP_SECRET:}
