services:
  acessolivre-app:
    container_name: acessolivre-app
    build:
      context: .
      dockerfile: dev.dockerfile
    ports:
      - "${SERVER_PORT}:8080"
      - "8000:8000"
      - "35729:35729"
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    environment:
      # Override para garantir que o app use o hostname correto do DB no Docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_PROFILES_ACTIVE=dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - acessolivre-network

  db:
    image: postgres:15
    container_name: acessolivre-db
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - acessolivre-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: acessolivre-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - acessolivre-network

volumes:
  postgres_data_dev:

networks:
  acessolivre-network:
    driver: bridge
